name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release ClipMate
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📌 Tag: ${TAG}, Version: ${VERSION}"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Build ARM64
        run: xcrun swift build -c release --arch arm64

      - name: Build x86_64
        run: xcrun swift build -c release --arch x86_64

      - name: Verify binaries
        run: |
          echo "=== ARM64 ==="
          file .build/arm64-apple-macosx/release/ClipMate
          echo "=== x86_64 ==="
          file .build/x86_64-apple-macosx/release/ClipMate

      - name: Package .app bundles and create DMGs
        run: |
          APP_NAME="ClipMate"
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUMBER="${{ github.run_number }}"
          MACOS_MIN="14.0"
          BUNDLE_ID="com.clipmate.app"

          # ---- Helper: create .app for a given binary ----
          create_app() {
            local arch_label="$1"
            local binary_path="$2"
            local bundle_dir=".build/${APP_NAME}-${arch_label}.app"

            rm -rf "${bundle_dir}"
            mkdir -p "${bundle_dir}/Contents/MacOS"
            mkdir -p "${bundle_dir}/Contents/Resources"

            # Copy binary
            cp "${binary_path}" "${bundle_dir}/Contents/MacOS/${APP_NAME}"
            chmod +x "${bundle_dir}/Contents/MacOS/${APP_NAME}"

            # Generate Info.plist
            cat > "${bundle_dir}/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>zh_CN</string>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>${BUNDLE_ID}</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${BUILD_NUMBER}</string>
              <key>LSMinimumSystemVersion</key>
              <string>${MACOS_MIN}</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHumanReadableCopyright</key>
              <string>Copyright © 2026 ClipMate. All rights reserved.</string>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSAccessibilityUsageDescription</key>
              <string>ClipMate needs accessibility permission to paste content into other apps.</string>
          </dict>
          </plist>
          EOF

            # Copy entitlements
            if [[ -f "Resources/ClipMate.entitlements" ]]; then
              cp "Resources/ClipMate.entitlements" "${bundle_dir}/Contents/Resources/${APP_NAME}.entitlements"
            fi

            # Copy icon
            if [[ -f "App/Resources/AppIcon.icns" ]]; then
              cp "App/Resources/AppIcon.icns" "${bundle_dir}/Contents/Resources/AppIcon.icns"
            elif [[ -f "Resources/AppIcon.icns" ]]; then
              cp "Resources/AppIcon.icns" "${bundle_dir}/Contents/Resources/AppIcon.icns"
            fi

            # Filter iCloud entitlements
            local ent="${bundle_dir}/Contents/Resources/${APP_NAME}.entitlements"
            if [[ -f "${ent}" ]]; then
              /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.ubiquity-container-identifiers" "${ent}" 2>/dev/null || true
              /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.ubiquity-kvstore-identifier" "${ent}" 2>/dev/null || true
            fi

            echo "${bundle_dir}"
          }

          # ---- Build ARM .app ----
          echo ">>> Creating ARM64 .app..."
          ARM_APP=$(create_app "ARM" ".build/arm64-apple-macosx/release/ClipMate")
          codesign --force --deep --sign - --options runtime "${ARM_APP}"

          # ---- Build Intel .app ----
          echo ">>> Creating Intel .app..."
          INTEL_APP=$(create_app "Intel" ".build/x86_64-apple-macosx/release/ClipMate")
          codesign --force --deep --sign - --options runtime "${INTEL_APP}"

          # ---- Build Universal .app ----
          echo ">>> Creating Universal .app..."
          UNIVERSAL_APP=".build/ClipMate-Universal.app"
          cp -R "${ARM_APP}" "${UNIVERSAL_APP}"
          lipo -create \
            ".build/arm64-apple-macosx/release/ClipMate" \
            ".build/x86_64-apple-macosx/release/ClipMate" \
            -output "${UNIVERSAL_APP}/Contents/MacOS/${APP_NAME}"
          codesign --force --deep --sign - --options runtime "${UNIVERSAL_APP}"

          # ---- Verify universal binary ----
          echo "=== Universal binary archs ==="
          lipo -archs "${UNIVERSAL_APP}/Contents/MacOS/${APP_NAME}"

          # ---- Create DMG ----
          DMG_STAGING=".build/dmg-staging"
          DMG_OUTPUT=".build/${APP_NAME}-${VERSION}.dmg"

          rm -rf "${DMG_STAGING}"
          mkdir -p "${DMG_STAGING}"
          cp -R "${UNIVERSAL_APP}" "${DMG_STAGING}/"
          ln -s /Applications "${DMG_STAGING}/Applications"

          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder "${DMG_STAGING}" \
            -ov \
            -format UDZO \
            "${DMG_OUTPUT}"

          echo "  ✅ ${DMG_OUTPUT} ($(du -h "${DMG_OUTPUT}" | cut -f1))"
          ls -lh .build/*.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ClipMate
          path: .build/ClipMate-*.dmg
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ClipMate ${{ github.ref_name }}
          body: |
            ## ClipMate ${{ github.ref_name }}

            ### 安装

            1. 下载 DMG 文件
            2. 双击打开，拖拽 ClipMate 到 Applications 文件夹
            3. 首次运行需在 **系统设置 > 隐私与安全性 > 辅助功能** 中授权

            ### 系统要求

            - macOS 14.0 (Sonoma) 或更高版本
            - 支持 Apple Silicon (M1/M2/M3/M4) 和 Intel Mac
          files: |
            .build/ClipMate-*.dmg
          draft: false
          prerelease: false
