name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build DMG (${{ matrix.arch.label }})
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      matrix:
        arch:
          - label: Apple Silicon
            arch_flag: arm64
            suffix: ARM
            runner: macos-14
          - label: Intel
            arch_flag: x86_64
            suffix: Intel
            runner: macos-13

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve dependencies
        run: xcrun swift package resolve

      - name: Build Release
        run: xcrun swift build -c release --arch ${{ matrix.arch.arch_flag }}

      - name: Verify binary
        run: |
          BINARY=".build/${{ matrix.arch.arch_flag }}-apple-macosx/release/ClipMate"
          if [[ ! -f "$BINARY" ]]; then
            echo "::error::Binary not found at $BINARY"
            exit 1
          fi
          file "$BINARY"
          echo "BINARY_PATH=$BINARY" >> "$GITHUB_ENV"

      - name: Create .app bundle
        run: |
          APP_NAME="ClipMate"
          VERSION="1.0.0"
          BUILD_NUMBER="${{ github.run_number }}"
          MACOS_MIN="14.0"
          BUNDLE_DIR=".build/${APP_NAME}.app"

          mkdir -p "${BUNDLE_DIR}/Contents/MacOS"
          mkdir -p "${BUNDLE_DIR}/Contents/Resources"

          # Copy binary
          cp "${BINARY_PATH}" "${BUNDLE_DIR}/Contents/MacOS/${APP_NAME}"
          chmod +x "${BUNDLE_DIR}/Contents/MacOS/${APP_NAME}"

          # Generate Info.plist
          cat > "${BUNDLE_DIR}/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>zh_CN</string>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>com.clipmate.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${BUILD_NUMBER}</string>
              <key>LSMinimumSystemVersion</key>
              <string>${MACOS_MIN}</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHumanReadableCopyright</key>
              <string>Copyright © 2026 ClipMate. All rights reserved.</string>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSAccessibilityUsageDescription</key>
              <string>ClipMate needs accessibility permission to paste content into other apps.</string>
          </dict>
          </plist>
          PLIST

          # Copy entitlements (filtered - no iCloud)
          if [[ -f "Resources/ClipMate.entitlements" ]]; then
            cp "Resources/ClipMate.entitlements" "${BUNDLE_DIR}/Contents/Resources/${APP_NAME}.entitlements"
          fi

          # Copy icon if available
          if [[ -f "App/Resources/AppIcon.icns" ]]; then
            cp "App/Resources/AppIcon.icns" "${BUNDLE_DIR}/Contents/Resources/AppIcon.icns"
          elif [[ -f "Resources/AppIcon.icns" ]]; then
            cp "Resources/AppIcon.icns" "${BUNDLE_DIR}/Contents/Resources/AppIcon.icns"
          fi

      - name: Filter entitlements (remove iCloud)
        run: |
          ENTITLEMENTS=".build/ClipMate.app/Contents/Resources/ClipMate.entitlements"
          if [[ -f "${ENTITLEMENTS}" ]]; then
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.ubiquity-container-identifiers" "${ENTITLEMENTS}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.ubiquity-kvstore-identifier" "${ENTITLEMENTS}" 2>/dev/null || true
          fi

      - name: Code sign (ad-hoc)
        run: |
          codesign --force --deep --sign - \
            --options runtime \
            ".build/ClipMate.app"

      - name: Create DMG
        run: |
          APP_NAME="ClipMate"
          VERSION="1.0.0"
          DMG_DIR=".build/dmg"
          SUFFIX="${{ matrix.arch.suffix }}"
          DMG_OUTPUT=".build/${APP_NAME}-${VERSION}-${SUFFIX}.dmg"

          rm -rf "${DMG_DIR}"
          mkdir -p "${DMG_DIR}"
          cp -R ".build/${APP_NAME}.app" "${DMG_DIR}/"
          ln -s /Applications "${DMG_DIR}/Applications"

          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder "${DMG_DIR}" \
            -ov \
            -format UDZO \
            "${DMG_OUTPUT}"

          echo "DMG_PATH=${DMG_OUTPUT}" >> "$GITHUB_ENV"
          echo "DMG_NAME=$(basename ${DMG_OUTPUT})" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipMate-${{ matrix.arch.suffix }}
          path: ${{ env.DMG_PATH }}
          retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ARM DMG
        uses: actions/download-artifact@v4
        with:
          name: ClipMate-ARM
          path: ./artifacts/

      - name: Download Intel DMG
        uses: actions/download-artifact@v4
        with:
          name: ClipMate-Intel
          path: ./artifacts/

      - name: List artifacts
        run: ls -lh ./artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClipMate ${{ github.ref_name }}
          body: |
            ## ClipMate ${{ github.ref_name }}

            ### 下载

            | 文件 | 架构 | 说明 |
            |------|------|------|
            | `ClipMate-*-ARM.dmg` | Apple Silicon (M1/M2/M3/M4) | 适用于 M 系列芯片 Mac |
            | `ClipMate-*-Intel.dmg` | Intel (x86_64) | 适用于 Intel 芯片 Mac |

            ### 安装

            1. 下载对应架构的 DMG 文件
            2. 双击打开，拖拽 ClipMate 到 Applications 文件夹
            3. 首次运行需在 **系统设置 > 隐私与安全性 > 辅助功能** 中授权

            ### 系统要求

            - macOS 14.0 (Sonoma) 或更高版本
          files: ./artifacts/*.dmg
          draft: false
          prerelease: false
